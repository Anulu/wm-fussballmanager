const VORNAMEN = ["Leon","Max","Luca","Niko","Jan","Tim","Paul","Finn","Ben","Noah","Elias","Felix","Jonas","David","Samuel","Kai","Tom","Marco","Diego","Carlos","Pedro","Ali","Yusuf","Hiro","Ken","Ivan","Luka","Mateo","Bruno","Andre","Sergio","Pablo"];
const NACHNAMEN = ["Müller","Silva","Santos","Garcia","Rossi","Smith","Costa","Lopez","Bauer","Wagner","Klein","Fischer","Weber","Hansen","Tanaka","Sato","Petrov","Novak","Moreno","Ferreira","Dubois","Martin","Conti","Greco","Bianchi","Kovac","Horvat","Nakamura","Reyes","Torres","Ramos","Vidal"];

const rnd = (min,max) => Math.floor(Math.random()*(max-min+1))+min;
const pick = (a) => a[Math.floor(Math.random()*a.length)];
function poisson(lambda){ const L=Math.exp(-lambda); let k=0,p=1; do{k++;p*=Math.random();}while(p>L); return Math.min(k-1,7); }

const POS_GEWICHT = {
  TW:{schnelligkeit:1,technik:2,kondition:1}, ABW:{schnelligkeit:2,technik:1,kondition:2},
  MF:{schnelligkeit:1,technik:3,kondition:2}, ANG:{schnelligkeit:3,technik:2,kondition:1},
};
function spielerRating(sp){
  const g=POS_GEWICHT[sp.position]; const s=g.schnelligkeit+g.technik+g.kondition;
  return Math.round((sp.schnelligkeit*g.schnelligkeit+sp.technik*g.technik+sp.kondition*g.kondition)/s);
}
function generiereKader(stärke, team){
  const positionen=[...Array(3).fill("TW"),...Array(8).fill("ABW"),...Array(8).fill("MF"),...Array(5).fill("ANG")];
  let echteNamen=null;
  if(team==="Deutschland"){
    echteNamen={TW:[],ABW:[],MF:[],ANG:[]};
    DEUTSCHLAND_KADER.forEach(p=>echteNamen[p.position].push(p.name));
  }
  const spieler=[]; const zähler={TW:0,ABW:0,MF:0,ANG:0};
  for(let i=0;i<24;i++){
    const pos=positionen[i]; const basis=stärke+rnd(-12,12);
    let name;
    if(echteNamen && echteNamen[pos][zähler[pos]]){ name=echteNamen[pos][zähler[pos]]; }
    else { name=`${pick(VORNAMEN)} ${pick(NACHNAMEN)}`; }
    zähler[pos]++;
    const sp={ id:i, name, position:pos,
      schnelligkeit:Math.max(40,Math.min(99,basis+rnd(-10,10))),
      technik:Math.max(40,Math.min(99,basis+rnd(-10,10))),
      kondition:Math.max(40,Math.min(99,basis+rnd(-10,10))) };
    sp.rating=spielerRating(sp); spieler.push(sp);
  }
  return spieler;
}

  const tab={}; teams.forEach(t=>{tab[t]={team:t,pkt:0,tore:0,gegentore:0,sp:0};});
  const paarungen=[];
  for(let i=0;i<teams.length;i++) for(let j=i+1;j<teams.length;j++) paarungen.push([teams[i],teams[j]]);
  paarungen.forEach(([a,b])=>{
    const eig=eigeneErgebnisse?.find(e=>(e.a===a&&e.b===b)||(e.a===b&&e.b===a));
    let ta,tb;
    if(eig){ ta=eig.a===a?eig.toreA:eig.toreB; tb=eig.a===a?eig.toreB:eig.toreA; }
    else if(nurReale){ return; }
    else { const sA=stärken[a]??70,sB=stärken[b]??70,diff=sA-sB;
      ta=poisson(Math.max(0.2,1.4+diff*0.06)); tb=poisson(Math.max(0.2,1.4-diff*0.06)); }
    tab[a].tore+=ta; tab[a].gegentore+=tb; tab[a].sp++;
    tab[b].tore+=tb; tab[b].gegentore+=ta; tab[b].sp++;
    if(ta>tb) tab[a].pkt+=3; else if(tb>ta) tab[b].pkt+=3; else { tab[a].pkt++; tab[b].pkt++; }
  });
  return Object.values(tab).sort((x,y)=> y.pkt-x.pkt || (y.tore-y.gegentore)-(x.tore-x.gegentore) || y.tore-x.tore );
}
function autoSpiel(teamA, teamB, stärken){
  const sA=stärken[teamA]??70,sB=stärken[teamB]??70,diff=sA-sB;
  const toreA=poisson(Math.max(0.2,1.4+diff*0.06)), toreB=poisson(Math.max(0.2,1.4-diff*0.06));
  if(toreA===toreB) return Math.random()<0.5+diff/80 ? teamA : teamB;
  return toreA>toreB ? teamA : teamB;
}
const ECKEN = [

function App(){

  const empfehlung=useMemo(()=>{

  const aufstellungKomplett=aufstellung.length===11 && Object.keys(FORMATION).every(p=>posZähler[p]===FORMATION[p]);
  const teamStärke=useMemo(()=>{

  function torschützen(anzahl,elf){
    const namen=[]; const pool=elf.filter(s=>s.position==="ANG"||s.position==="MF"); const basis=pool.length?pool:elf;

  }
  function simuliereSpiel(meineStärke,gegnerStärke,gegnerName,elf,runde){
    const diff=meineStärke-gegnerStärke;
    const meineTore=poisson(Math.max(0.2,1.4+diff*0.06));
    const gegnerTore=poisson(Math.max(0.2,1.4-diff*0.06));
    const gSkills={ sch:Math.max(40,Math.min(99,gegnerStärke+rnd(-5,5))), tec:Math.max(40,Math.min(99,gegnerStärke+rnd(-5,5))), kon:Math.max(40,Math.min(99,gegnerStärke+rnd(-5,5))) };

    const minSet=new Set();
    const fm=()=>{let m;do{m=rnd(1,90);}while(minSet.has(m));minSet.add(m);return m;};

    const vorfälle=[]; const vomPlatz=new Set();
    if(Math.random()<0.15){ const sp=pick(elf); vorfälle.push({typ:"verletzung",minute:fm(),spielerId:sp.id,name:sp.name}); vomPlatz.add(sp.id); }
    const gelbAnzahl=Math.random()<0.5?(Math.random()<0.5?1:2):(Math.random()<0.3?3:0);
    const gelbeProSpieler={};
    for(let i=0;i<gelbAnzahl;i++){
      const kand=elf.filter(s=>!vomPlatz.has(s.id) || (gelbeProSpieler[s.id]===1));
      if(!kand.length) break;
      const sp=pick(kand); const bisher=gelbeProSpieler[sp.id]||0; if(bisher>=2) continue;
      gelbeProSpieler[sp.id]=bisher+1;
      const typ=bisher===0?"gelb":"gelb-rot";
      vorfälle.push({typ,minute:fm(),spielerId:sp.id,name:sp.name});
      if(typ==="gelb-rot") vomPlatz.add(sp.id);
    }
    if(Math.random()<0.08){ const kand=elf.filter(s=>!vomPlatz.has(s.id)); if(kand.length){ const sp=pick(kand); vorfälle.push({typ:"rot",minute:fm(),spielerId:sp.id,name:sp.name}); vomPlatz.add(sp.id); } }
    vorfälle.sort((a,b)=>a.minute-b.minute);
    Object.keys(gelbeProSpieler).forEach(id=>{
      if(gelbeProSpieler[id]>=2){
        const erste=vorfälle.find(v=>String(v.spielerId)===id && v.typ==="gelb");
        const gr=vorfälle.find(v=>String(v.spielerId)===id && v.typ==="gelb-rot");
        if(erste && gr && gr.minute<erste.minute){ const t=gr.minute; gr.minute=erste.minute; erste.minute=t; }
      }
    });
    vorfälle.sort((a,b)=>a.minute-b.minute);

    const abMinute={};
    vorfälle.forEach(v=>{ if((v.typ==="rot"||v.typ==="gelb-rot"||v.typ==="verletzung") && abMinute[v.spielerId]===undefined) abMinute[v.spielerId]=v.minute; });

    const torEvents=[];
    const torMinuten=[]; for(let i=0;i<meineTore;i++) torMinuten.push(fm()); torMinuten.sort((a,b)=>a-b);
    torMinuten.forEach(minute=>{
      const verfügbar=elf.filter(s=> abMinute[s.id]===undefined || minute < abMinute[s.id]);
      const basis=verfügbar.length?verfügbar:elf;
      const pool=basis.filter(s=>s.position==="ANG"||s.position==="MF");
      const kandidaten=(pool.length?pool:basis).flatMap(s=>s.position==="ANG"?[s,s]:[s]);
      torEvents.push({minute,team:"mein",schütze:pick(kandidaten).name});
    });
    for(let i=0;i<gegnerTore;i++) torEvents.push({minute:fm(),team:"gegner",schütze:gegnerName});
    torEvents.sort((a,b)=>a.minute-b.minute);

    return { runde,gegnerName,meineTore,gegnerTore, torEvents, vorfälle, meineSkills:teamStärke, gSkills };
  }
  function baueGruppen(){
    const alle=[...TEAMS].sort(()=>Math.random()-0.5); const ohneMich=alle.filter(t=>t!==meinTeam);
    const gruppen=[[meinTeam,...ohneMich.slice(0,3)]]; let idx=3;
    for(let g=1;g<16;g++){ gruppen.push(ohneMich.slice(idx,idx+4)); idx+=4; }

  function spieleTurnier(){

    const stärken={...pausiert.stärken,[meinTeam]:teamStärke.gesamt};

  function nächstesSpiel(state){

    } else finalisiereSpiel(state,res,res.meineTore>res.gegnerTore,null);
  }
  function verrechneKarten(state,vorfälle){
    const gelbKonto={...(state.gelbKonto||{})}; let sperrKonto={...(state.sperrKonto||{})};
    Object.keys(sperrKonto).forEach(id=>{ sperrKonto[id]--; if(sperrKonto[id]<=0) delete sperrKonto[id]; });
    const neueSperren=[]; const nameVon=(id)=>{const sp=kader.find(s=>s.id===Number(id)); return sp?sp.name:"Spieler";};
    vorfälle.forEach(v=>{
      if(v.typ==="gelb"){ gelbKonto[v.spielerId]=(gelbKonto[v.spielerId]||0)+1;
        if(gelbKonto[v.spielerId]>=2){ gelbKonto[v.spielerId]=0; sperrKonto[v.spielerId]=Math.max(sperrKonto[v.spielerId]||0,1); neueSperren.push({spielerId:v.spielerId,name:v.name,typ:"gelb-sperre",spiele:1}); } }
      else if(v.typ==="gelb-rot"){ gelbKonto[v.spielerId]=0; sperrKonto[v.spielerId]=Math.max(sperrKonto[v.spielerId]||0,1); neueSperren.push({spielerId:v.spielerId,name:v.name,typ:"gelb-rot",spiele:1}); }
      else if(v.typ==="rot"){ sperrKonto[v.spielerId]=Math.max(sperrKonto[v.spielerId]||0,2); neueSperren.push({spielerId:v.spielerId,name:v.name,typ:"rot",spiele:2}); }
      else if(v.typ==="verletzung"){ sperrKonto[v.spielerId]=Math.max(sperrKonto[v.spielerId]||0,1); neueSperren.push({spielerId:v.spielerId,name:v.name,typ:"verletzung",spiele:1}); }
    });
    const aktuelleSperren=Object.entries(sperrKonto).map(([id,spiele])=>{
      const v=neueSperren.find(s=>String(s.spielerId)===id); return v||{spielerId:Number(id),name:nameVon(id),typ:"sperre",spiele};
    });
    return {gelbKonto,sperrKonto,aktuelleSperren};

  function finalisiereSpiel(state,res,gewonnen,elfmeterErgebnis){
    const neuLog=[...state.log,{...res,gewonnen,elfmeter:elfmeterErgebnis}]; setTurnierLog(neuLog);
    let entwicklung=[];
    if(gewonnen){

        const bonus=ts.has(sp.name)?rnd(2,4):rnd(1,2); const v={...sp}; let rest=bonus; const sk=["schnelligkeit","technik","kondition"];
        while(rest>0){ const s=pick(sk); if(v[s]<99){v[s]++;rest--;} else if(sk.every(x=>v[x]>=99)) break; }
        v.rating=spielerRating(v); const d=v.rating-sp.rating; if(d>0) entwicklung.push({name:sp.name,delta:d,torschütze:ts.has(sp.name)}); return v;
      });

    }
    const {gelbKonto,sperrKonto,aktuelleSperren}=verrechneKarten(state,res.vorfälle);
    const neueSperren=aktuelleSperren; const gset=new Set(neueSperren.map(s=>s.spielerId));

      if(state.gruppenSpielIdx<2){
        folge={typ:"state",wert:{...state,gruppenSpielIdx:state.gruppenSpielIdx+1,eigeneErgebnisse,log:neuLog,entwicklung,gesperrt:neueSperren,gelbKonto,sperrKonto}};
      } else {
        const tabelleMeine=simuliereGruppe(state.meineGruppe,state.stärken,eigeneErgebnisse);
        const meinPlatz=tabelleMeine.findIndex(r=>r.team===meinTeam)+1;
        if(meinPlatz>2){ folge={typ:"ende",end:"gruppe-aus",wert:{...state,eigeneErgebnisse,log:neuLog,tabelleMeine,meinPlatz}}; }
        else {
          const quali=[]; state.gruppen.forEach((grp,gi)=>{ const tab=gi===0?tabelleMeine:simuliereGruppe(grp,state.stärken,null); quali.push(tab[0].team,tab[1].team); });
          const ohneMich=quali.filter(t=>t!==meinTeam).sort(()=>Math.random()-0.5); const feld=[meinTeam,...ohneMich];
          folge={typ:"state",wert:{...state,phase:"ko",feld,rundeIdx:0,eigeneErgebnisse,log:neuLog,entwicklung,gesperrt:neueSperren,tabelleMeine,meinPlatz,gruppeFertig:true,gelbKonto,sperrKonto}};
        }
      }
    } else {

      else if(state.rundeIdx===RUNDEN.length-1){ folge={typ:"ende",end:"weltmeister",wert:null}; }
      else {
        const feld=state.feld; const sieger=[meinTeam]; const andereErgebnisse=[];
        for(let i=2;i<feld.length;i+=2){ const a=feld[i],b=feld[i+1]; if(b===undefined){sieger.push(a);continue;} const w=autoSpiel(a,b,state.stärken); sieger.push(w); andereErgebnisse.push({a,b,sieger:w}); }
        const ohneMich=sieger.filter(t=>t!==meinTeam).sort(()=>Math.random()-0.5); const neuesFeld=[meinTeam,...ohneMich];

  }

  // Übernimmt den nach dem Spiel berechneten Folgezustand
  function folgeAnwenden(folge){
    if(folge.typ==="ende"){ setEndergebnis(folge.end); if(folge.wert) setTurnierState(folge.wert); else setTurnierState(null); setPhase("ergebnis"); }
    else { setTurnierState(folge.wert); }
  }

  // Ersatzspieler für einen verletzten Spieler wählen
  function wähleErsatz(ersatzId){
    setWechsel(w=>{
      const verletzter=w.verletzte[w.naechster];
      // Aufstellung: verletzten Spieler durch Ersatz ersetzen (für Folgeprüfungen)
      setAufstellung(prev=>{
        const ohne=prev.filter(id=>id!==verletzter.spielerId);
        return ersatzId!=null ? [...ohne,ersatzId] : ohne;
      });
      const nächster=w.naechster+1;
      if(nächster<w.verletzte.length){ return {...w,naechster:nächster}; }
      // Alle Verletzten abgearbeitet -> Folgezustand übernehmen
      folgeAnwenden(w.folge);
      return null;
    });
  }
  function elfmeterAktion(wahl){
    setElfmeter(em=>{
      const istMein=em.modus==="schiessen"; const cpu=pick(ECKEN).id;
      let m=em.meinScore,g=em.gegnerScore,b;
      if(istMein){ const tor=wahl!==cpu; if(tor)m++; b={typ:"schuss",wahl,twWahl:cpu,tor}; }
      else { const tor=wahl!==cpu; if(tor)g++; b={typ:"halten",schuss:cpu,meinTw:wahl,tor}; }
      const ns=em.schuss+1; const nv=[...em.verlauf,b]; const nm=istMein?"halten":"schiessen";

      // Wie viele reguläre Schüsse (bis 5 je Seite) bleiben jeder Seite?
      // Gerade Schussnummern = ich, ungerade = Gegner.
      let meineGenommen=0, gegnerGenommen=0;
      for(let i=0;i<ns;i++){ if(i%2===0) meineGenommen++; else gegnerGenommen++; }
      const meineOffen=Math.max(0,5-meineGenommen);
      const gegnerOffen=Math.max(0,5-gegnerGenommen);

      let fertig=false, gewonnen=false;
      if(meineGenommen<=5 && gegnerGenommen<=5){
        // Reguläre Phase: vorzeitiges Ende, wenn ein Rückstand nicht mehr aufholbar ist
        if(m > g + gegnerOffen){ fertig=true; gewonnen=true; }

        else if(meineGenommen===5 && gegnerGenommen===5 && m!==g){ fertig=true; gewonnen=m>g; }
      } else {
        // Sudden Death: nach jedem vollständigen Paar entscheiden
        if(ns%2===0 && m!==g){ fertig=true; gewonnen=m>g; }
      }

      if(fertig){ setTimeout(()=>{finalisiereSpiel(em.state,em.res,gewonnen,{m,g});setElfmeter(null);},1200);
        return {...em,meinScore:m,gegnerScore:g,schuss:ns,verlauf:nv,modus:nm,fertig:true,gewonnen}; }
      return {...em,meinScore:m,gegnerScore:g,schuss:ns,verlauf:nv,modus:nm};
    });
  }
  function neustart(){

  }

  return (
    <div className="wrap">

      </div>

      {phase==="auswahl" && (
        <div>

            {TEAMS.map(t=>(
              <button key={t} className="teamsel" onClick={()=>wähleTeam(t)}>
                <span style={{fontSize:"16px"}}>{flagge(t)}</span> {t}
              </button>
            ))}
          </div>
        </div>
      )}

      {phase==="aufstellung" && (
        <Aufstellung {...{meinTeam,kader,aufstellung,empfehlung,gesperrteIds,gesperrteListe,posZähler,
          teamStärke,aufstellungKomplett,pausiert,toggleSpieler,übernehmeEmpfehlung,neustart,
          start:pausiert?setzeFort:spieleTurnier}} />
      )}

      {phase==="turnier" && (
        <div>
          {wechsel ? <WechselView wechsel={wechsel} kader={kader} aufstellung={aufstellung} gesperrteIds={gesperrteIds} onWähle={wähleErsatz} />
          : liveSpiel ? <LiveSpiel key={liveSpiel.res.runde+liveSpiel.res.gegnerName} ls={liveSpiel} meinTeam={meinTeam} onFertig={spielFertig} />
          : elfmeter ? <ElfmeterView em={elfmeter} meinTeam={meinTeam} onAktion={elfmeterAktion} />

            <Zwischen {...{turnierState,meinTeam,turnierLog,nächstesSpiel,
              aufstellungAendern:()=>{setPausiert(turnierState);setTurnierState(null);setPhase("aufstellung");}}} />
          ) : null}
        </div>
      )}

      {phase==="ergebnis" && (
        <Ergebnis {...{endergebnis,meinTeam,turnierState,turnierLog,
          neueAufstellung:()=>{setTurnierState(null);setPausiert(null);setPhase("aufstellung");}, neustart}} />
      )}
    </div>
  );
}

function WechselView({wechsel,kader,aufstellung,gesperrteIds,onWähle}){
  const verletzter=wechsel.verletzte[wechsel.naechster];
  const verletzterSp=kader.find(s=>s.id===verletzter.spielerId);
  const pos=verletzterSp?.position;
  // Verfügbare Ersatzspieler: gleiche Position, nicht in der Elf, nicht gesperrt, nicht der Verletzte
  const inElf=new Set(aufstellung);
  const kandidaten=kader
    .filter(s=>s.position===pos && !inElf.has(s.id) && !gesperrteIds.has(s.id) && s.id!==verletzter.spielerId)
    .sort((a,b)=>b.rating-a.rating);
  const mehr = wechsel.verletzte.length>1 ? ` (${wechsel.naechster+1}/${wechsel.verletzte.length})` : "";
  return (
    <div>
      <div className="panel mb3" style={{background:"#fff7ed",borderColor:"#fed7aa"}}>
        <h2 style={{margin:"0 0 4px"}}>🩹 Verletzung{mehr}</h2>
        <p className="small" style={{margin:0}}>
          <b>{verletzter.name}</b>{pos?` (${pos})`:""} hat sich verletzt und fällt aus.
          Wähle einen Ersatz auf der Position <b>{pos}</b>:
        </p>
      </div>
      {kandidaten.length>0 ? (
        <div className="grid gsm2 mb3">
          {kandidaten.map(sp=>(
            <button key={sp.id} onClick={()=>onWähle(sp.id)} className="plr">
              <span className={`posbadge pos-${sp.position}`}>{sp.position}</span>
              <div className="flex1">
                <div className="semi small truncate">{sp.name}</div>
                <div className="row gap2 small grey">
                  <span>SCH {sp.schnelligkeit}</span><span>TEC {sp.technik}</span><span>KON {sp.kondition}</span>
                  <span style={{fontWeight:700,color:"#374151"}}>★{sp.rating}</span>
                </div>
              </div>
              <Chevron size={18} color="#16a34a" className="shrink0"/>
            </button>
          ))}
        </div>
      ) : (
        <p className="small grey mb3">Kein Ersatzspieler auf dieser Position verfügbar.</p>
      )}
      <button onClick={()=>onWähle(null)} className="btn btn-grey">
        {kandidaten.length>0 ? "Ohne Ersatz weiterspielen" : "Weiter"}
      </button>
    </div>
  );
}

function LiveSpiel({ls,meinTeam,onFertig}){
  const {res,state}=ls;
  const [minute,setMinute]=useState(0);
  const [meinScore,setMeinScore]=useState(0);
  const [gegnerScore,setGegnerScore]=useState(0);
  const [gezeigt,setGezeigt]=useState([]);
  const fertigRef=useRef(false);
  useEffect(()=>{
    const DAUER=4000;
    const alle=[...res.torEvents.map(e=>({...e,art:"tor"})),...(res.vorfälle||[]).map(v=>({...v,art:"vorfall"}))].sort((a,b)=>a.minute-b.minute);
    const start=performance.now(); let raf;
    function tick(now){
      const t=Math.min(1,(now-start)/DAUER); const m=Math.round(t*90); setMinute(m);
      const erreicht=alle.filter(e=>e.minute<=m); setGezeigt(erreicht);
      setMeinScore(erreicht.filter(e=>e.art==="tor"&&e.team==="mein").length);
      setGegnerScore(erreicht.filter(e=>e.art==="tor"&&e.team==="gegner").length);
      if(t<1) raf=requestAnimationFrame(tick);
      else if(!fertigRef.current){ fertigRef.current=true; setTimeout(()=>onFertig(res,state),900); }
    }
    raf=requestAnimationFrame(tick); return ()=>cancelAnimationFrame(raf);
  },[]);
  return (
    <div>
      <div className="tc mb3">
        <div className="tiny semi grey">{res.runde}</div>
        {res.stadion && <div className="tiny grey mt1">📍 {res.stadion.stadion}, {res.stadion.stadt}</div>}
        <div className="row center gap2 mt1" style={{color:"var(--ink)"}}><Clock size={18} color="var(--green-dark)"/><span className="mono bold" style={{fontSize:"20px"}}>{minute}'</span></div>
      </div>
      <div className="scoreboard mb4">
        <div className="row center gap4 bold" style={{fontSize:"22px"}}>
          <span className="flex1 tr">{flagge(meinTeam)} {meinTeam}</span>
          <span className="mono" style={{background:"rgba(255,255,255,.12)",borderRadius:"8px",padding:"4px 16px",color:"var(--green)"}}>{meinScore} : {gegnerScore}</span>
          <span className="flex1 tl">{res.gegnerName} {flagge(res.gegnerName)}</span>
        </div>
        <div className="bar"><div style={{width:`${(minute/90)*100}%`}}/></div>
      </div>
      <div style={{minHeight:"60px",lineHeight:1.7}}>
        {gezeigt.length===0 ? (
          <div className="tc">
            <p className="grey2 small mb2">Anpfiff! Das Spiel läuft…</p>
            {res.siegchance!=null && (
              <div className="panel" style={{display:"inline-block",padding:"10px 14px"}}>
                <div className="tiny grey mb1">Siegprognose</div>
                <div className="row gap2">
                  <span className="small bold" style={{color:"var(--green-deep)"}}>{res.siegchance}%</span>
                  <div style={{width:"128px",height:"10px",background:"#f3c9cd",borderRadius:"99px",overflow:"hidden"}}><div style={{height:"100%",background:"var(--green)",width:`${res.siegchance}%`}}/></div>
                  <span className="small bold" style={{color:"#d9485a"}}>{100-res.siegchance}%</span>
                </div>
              </div>
            )}
          </div>
        ) : gezeigt.map((e,i)=>{
          if(e.art==="vorfall"){
            const sym=e.typ==="rot"?"🟥":e.typ==="gelb-rot"?"🟨🟥":e.typ==="gelb"?"🟨":"🩹";
            const txt=e.typ==="rot"?"Rote Karte!":e.typ==="gelb-rot"?"Gelb-Rote Karte!":e.typ==="gelb"?"Gelbe Karte":"verletzt";
            return <div key={i} className="small row gap2" style={{color:"#b9742a"}}><span className="mono bold">{e.minute}'</span><span>{sym}</span><span className="semi">{e.name}</span><span className="tiny grey">{txt}</span></div>;
          }
          return <div key={i} className="small row gap2" style={{color:e.team==="mein"?"var(--green-deep)":"#d9485a"}}><span className="mono bold">{e.minute}'</span><span>⚽</span><span className="semi">{e.schütze}</span>{e.team==="gegner"&&<span className="tiny grey">(Gegner)</span>}</div>;
        })}
      </div>
    </div>
  );
}

function ElfmeterView({em,meinTeam,onAktion}){
  const istSchuss=em.modus==="schiessen";
  const letzte=em.verlauf[em.verlauf.length-1];
  // anim: null | "anlauf" | "flug" | "fertig"
  const [anim,setAnim]=React.useState("idle");
  const [wahl,setWahl]=React.useState(null);
  const timers=useRef([]);

  // Positionen (in %) für Ball-Flug je Ecke
  const ballX={links:-72,mitte:0,rechts:72};

  function spielen(ecke){
    if(anim==="anlauf"||anim==="flug") return;
    setWahl(ecke);
    setAnim("anlauf");
    // kurze Spannungsphase, dann Schuss auswerten (ruft App-Logik auf)
    timers.current.push(setTimeout(()=>{
      setAnim("flug");
      onAktion(ecke); // erzeugt neues "letzte"-Ergebnis im Eltern-State
    }, 650));
  }

  // Wenn ein neues Ergebnis vorliegt, Flug-Animation kurz halten, dann auflösen
  useEffect(()=>{
    if(anim==="flug"){
      const t=setTimeout(()=>setAnim("fertig"), 700);
      timers.current.push(t);
      const t2=setTimeout(()=>{ setAnim("idle"); setWahl(null); }, 1500);
      timers.current.push(t2);
    }
    return ()=>{};
  },[em.verlauf.length]); // läuft, sobald ein neues Ergebnis hinzukommt

  useEffect(()=>()=>{ timers.current.forEach(clearTimeout); },[]);

  const zeigeErgebnis = anim==="flug" || anim==="fertig";
  const ballEcke = zeigeErgebnis && letzte ? (letzte.typ==="schuss"?letzte.wahl:letzte.schuss) : null;
  const keeperEcke = zeigeErgebnis && letzte ? (letzte.typ==="schuss"?letzte.twWahl:letzte.meinTw) : null;
  const tor = letzte?.tor;

  // Ballposition
  let ballStyle={transform:"translateY(0)"};
  if(zeigeErgebnis && ballEcke){
    ballStyle={transform:`translate(${ballX[ballEcke]}px,-92px)`};
  } else if(anim==="anlauf"){
    ballStyle={transform:"translateY(6px) scale(.9)"};
  }
  // Torwartposition (hechtet zur gewählten Ecke)
  let kStyle={left:"calc(50% - 16px)"};
  if(zeigeErgebnis && keeperEcke==="links") kStyle={left:"12%"};
  else if(zeigeErgebnis && keeperEcke==="rechts") kStyle={left:"auto",right:"12%"};
  else if(zeigeErgebnis && keeperEcke==="mitte") kStyle={left:"calc(50% - 16px)"};

  return (
    <div>
      <div className="tc mb3">
        <div className="tiny semi grey">{em.runde} · Elfmeterschießen</div>
        {em.stadion && <div className="tiny grey2 mt1">📍 {em.stadion.stadion}, {em.stadion.stadt}</div>}
        <div className="bold mt1 pk-score" style={{fontSize:"34px"}}>
          <span style={{color:"var(--green-deep)"}}>{em.meinScore}</span><span className="grey2"> : </span><span style={{color:"#d9485a"}}>{em.gegnerScore}</span>
        </div>
        <div className="small grey">{flagge(meinTeam)} {meinTeam} vs {em.gegner} {flagge(em.gegner)}</div>
      </div>

      {/* Animierte Schuss-Bühne */}
      <div className={`pk-stage mb3 ${anim==="fertig"&&!tor?"pk-shake":""}`}>
        <div className="pk-net"></div>
        {/* Torwart */}
        <div className="pk-keeper" style={kStyle}>🧤</div>
        {/* Ball */}
        <div className="pk-ball" style={ballStyle}>⚽</div>
        {/* Auflösung */}
        {anim==="fertig" && letzte && (
          <div className="pk-flash pk-pop" style={{color:tor?"var(--green-deep)":"#d9485a"}}>
            {letzte.typ==="schuss"
              ? (tor?"TOR! ⚽":"GEHALTEN! 🧤")
              : (tor?"GEGENTOR 😟":"PARIERT! 🧤")}
          </div>
        )}
        {anim==="anlauf" && (
          <div className="pk-flash" style={{color:"var(--ink)",fontSize:"18px"}}>Anlauf…</div>
        )}
      </div>

      {/* Schützen-Punkte (Verlauf) */}
      <div className="pk-step mb3">
        {em.verlauf.map((v,i)=>(
          <span key={i} className={`pk-dot ${v.tor?(v.typ==="schuss"?"goal":"miss"):(v.typ==="schuss"?"miss":"goal")}`}
            title={v.typ==="schuss"?(v.tor?"dein Tor":"gehalten"):(v.tor?"Gegentor":"du hast gehalten")}></span>
        ))}
      </div>

      {!em.fertig ? (
        <div>
          <p className="tc semi mb3">
            {anim==="anlauf"||anim==="flug" ? "…"
              : istSchuss ? "⚽ In welche Ecke schießt du?" : "🧤 In welche Ecke springst du?"}
          </p>
          <div className="grid g3">
            {ECKEN.map(e=>(
              <button key={e.id} onClick={()=>spielen(e.id)} className="ecke"
                disabled={anim==="anlauf"||anim==="flug"}>
                <e.icon size={22}/>{e.label}
              </button>
            ))}
          </div>
          <p className="tc tiny grey2 mt2">Schuss {Math.floor(em.schuss/2)+1}</p>
        </div>
      ) : (
        <div className="tc bold" style={{fontSize:"18px",padding:"14px",borderRadius:"12px",background:em.gewonnen?"#effaf3":"#fdf2f3",color:em.gewonnen?"var(--green-deep)":"#d9485a"}}>
          {em.gewonnen?"🎉 Du gewinnst das Elfmeterschießen!":"😞 Verloren im Elfmeterschießen."}
        </div>
      )}
    </div>
  );
}

function Ergebnis({endergebnis,meinTeam,turnierState,turnierLog,neueAufstellung,neustart}){
  return (
    <div>
      <div className="panel tc mb4" style={endergebnis==="weltmeister"?{background:"#effaf3",borderColor:"var(--green)",borderWidth:"2px"}:{background:"#f3f6f8",borderColor:"#d7e0e6",borderWidth:"2px"}}>
        <div className="row center mb2"><Trophy size={48} color={endergebnis==="weltmeister"?"var(--green-dark)":"#9fb0bd"}/></div>

        : endergebnis==="gruppe-aus" ? <><h2>In der Gruppenphase ausgeschieden</h2><p className="grey">{flagge(meinTeam)} {meinTeam} wurde nur {turnierState?.meinPlatz}. – nur die Top 2 kommen weiter.</p></>
        : <><h2>Aus im {endergebnis}</h2><p className="grey">{flagge(meinTeam)} {meinTeam} ist ausgeschieden. Nächstes Mal!</p></>}
      </div>
      <div className="grid mb4" style={{gap:"12px"}}>
        {turnierLog.map((s,i)=><Spielkarte key={i} s={s} meinTeam={meinTeam}/>)}
      </div>
      <div className="row gap2">
        <button onClick={neueAufstellung} className="btn btn-blue flex1">Neue Aufstellung</button>
        <button onClick={neustart} className="btn btn-grey flex1"><Rotate size={18}/> Neues Spiel</button>
      </div>
    </div>
  );
}

})();

  const positionen=[...Array(3).fill("TW"),...Array(8).fill("ABW"),...Array(8).fill("MF"),...Array(5).fill("ANG")];

  // Deutschland: echte WM-Spieler auf die 24 Plätze verteilen
  let echteNamen=null;
  if(team==="Deutschland"){
    echteNamen={TW:[],ABW:[],MF:[],ANG:[]};
    DEUTSCHLAND_KADER.forEach(p=>echteNamen[p.position].push(p.name));
    // Falls in einer Position mehr echte Spieler als Plätze: Rest auf knappe Positionen umlegen
    // (8 ABW, 8 MF, 5 ANG, 3 TW). Überzählige Angreifer/Mittelfeldler ggf. als Reserve.
  }

  const spieler=[];
  const zähler={TW:0,ABW:0,MF:0,ANG:0};
  for(let i=0;i<24;i++){
    const pos=positionen[i];
    const basis=stärke+rnd(-12,12);
    let name;
    if(echteNamen && echteNamen[pos][zähler[pos]]){ name=echteNamen[pos][zähler[pos]]; }
    else { name=`${pick(VORNAMEN)} ${pick(NACHNAMEN)}`; }
    zähler[pos]++;
    const sp={ id:i, name, position:pos,
      schnelligkeit:Math.max(40,Math.min(99,basis+rnd(-10,10))),
      technik:Math.max(40,Math.min(99,basis+rnd(-10,10))),
      kondition:Math.max(40,Math.min(99,basis+rnd(-10,10))) };
    sp.rating=spielerRating(sp); spieler.push(sp);
  }
  return spieler;
}
const FORMATION = { TW:1, ABW:4, MF:4, ANG:2 };
const RUNDEN = ["Sechzehntelfinale","Achtelfinale","Viertelfinale","Halbfinale","Finale"];

function simuliereGruppe(teams, stärken, eigeneErgebnisse, nurReale=false){
  const tab={}; teams.forEach(t=>{tab[t]={team:t,pkt:0,tore:0,gegentore:0,sp:0};});
  const paarungen=[];
  for(let i=0;i<teams.length;i++) for(let j=i+1;j<teams.length;j++) paarungen.push([teams[i],teams[j]]);
  paarungen.forEach(([a,b])=>{
    const eig=eigeneErgebnisse?.find(e=>(e.a===a&&e.b===b)||(e.a===b&&e.b===a));
    let ta,tb;
    if(eig){ ta=eig.a===a?eig.toreA:eig.toreB; tb=eig.a===a?eig.toreB:eig.toreA; }
    else if(nurReale){ return; }
    else { const sA=stärken[a]??70,sB=stärken[b]??70,diff=sA-sB;
      ta=poisson(Math.max(0.2,1.4+diff*0.06)); tb=poisson(Math.max(0.2,1.4-diff*0.06)); }
    tab[a].tore+=ta; tab[a].gegentore+=tb; tab[a].sp++;
    tab[b].tore+=tb; tab[b].gegentore+=ta; tab[b].sp++;
    if(ta>tb) tab[a].pkt+=3; else if(tb>ta) tab[b].pkt+=3; else { tab[a].pkt++; tab[b].pkt++; }
  });
  return Object.values(tab).sort((x,y)=> y.pkt-x.pkt || (y.tore-y.gegentore)-(x.tore-x.gegentore) || y.tore-x.tore );
}
function autoSpiel(teamA, teamB, stärken){
  const sA=stärken[teamA]??70,sB=stärken[teamB]??70,diff=sA-sB;
  const toreA=poisson(Math.max(0.2,1.4+diff*0.06)), toreB=poisson(Math.max(0.2,1.4-diff*0.06));
  if(toreA===toreB) return Math.random()<0.5+diff/80 ? teamA : teamB;
  return toreA>toreB ? teamA : teamB;
}
const ECKEN = [
  { id:"links", label:"Links", icon:ArrowL },
  { id:"mitte", label:"Mitte", icon:ArrowU },
  { id:"rechts", label:"Rechts", icon:ArrowR },
];

function App(){
  const [phase,setPhase]=useState("auswahl");
  const [meinTeam,setMeinTeam]=useState(null);
  const [kader,setKader]=useState([]);
  const [aufstellung,setAufstellung]=useState([]);
  const [gegnerStärken,setGegnerStärken]=useState({});
  const [turnierLog,setTurnierLog]=useState([]);
  const [endergebnis,setEndergebnis]=useState(null);
  const [elfmeter,setElfmeter]=useState(null);
  const [turnierState,setTurnierState]=useState(null);
  const [liveSpiel,setLiveSpiel]=useState(null);
  const [pausiert,setPausiert]=useState(null);

  function wähleTeam(team){
    const stärke = team==="Deutschland" ? rnd(78,86) : rnd(68,82);
    setMeinTeam(team); setKader(generiereKader(stärke, team)); setAufstellung([]);
    const gs={}; TEAMS.filter(t=>t!==team).forEach(t=>{gs[t]=rnd(64,86);}); setGegnerStärken(gs);
    setPhase("aufstellung");
  }

  const empfehlung=useMemo(()=>{
    if(kader.length===0) return [];
    const sperrSet=new Set(((pausiert||turnierState)?.gesperrt||[]).map(s=>s.spielerId));
    const ids=[];
    Object.entries(FORMATION).forEach(([pos,anzahl])=>{
      kader.filter(s=>s.position===pos&&!sperrSet.has(s.id)).sort((a,b)=>b.rating-a.rating).slice(0,anzahl).forEach(s=>ids.push(s.id));
    });
    return ids;
  },[kader,pausiert,turnierState]);
  const übernehmeEmpfehlung=()=>setAufstellung(empfehlung);

  const gesperrteListe=(pausiert||turnierState)?.gesperrt||[];
  const gesperrteIds=useMemo(()=>new Set(gesperrteListe.map(s=>s.spielerId)),[gesperrteListe]);

  function toggleSpieler(id){
    if(gesperrteIds.has(id)) return;
    setAufstellung(prev=>{
      if(prev.includes(id)) return prev.filter(x=>x!==id);
      const sp=kader.find(s=>s.id===id);
      const anzahl=prev.map(pid=>kader.find(s=>s.id===pid)).filter(s=>s.position===sp.position).length;
      if(anzahl>=FORMATION[sp.position]) return prev;
      if(prev.length>=11) return prev;
      return [...prev,id];
    });
  }
  const posZähler=useMemo(()=>{
    const z={TW:0,ABW:0,MF:0,ANG:0}; aufstellung.forEach(id=>{z[kader.find(s=>s.id===id).position]++;}); return z;
  },[aufstellung,kader]);
  const aufstellungKomplett=aufstellung.length===11 && Object.keys(FORMATION).every(p=>posZähler[p]===FORMATION[p]);
  const teamStärke=useMemo(()=>{
    if(aufstellung.length===0) return {sch:0,tec:0,kon:0,gesamt:0};
    const elf=aufstellung.map(id=>kader.find(s=>s.id===id));
    const sch=Math.round(elf.reduce((a,s)=>a+s.schnelligkeit,0)/elf.length);
    const tec=Math.round(elf.reduce((a,s)=>a+s.technik,0)/elf.length);
    const kon=Math.round(elf.reduce((a,s)=>a+s.kondition,0)/elf.length);
    return {sch,tec,kon,gesamt:Math.round((sch+tec+kon)/3)};
  },[aufstellung,kader]);

  function torschützen(anzahl,elf){
    const namen=[]; const pool=elf.filter(s=>s.position==="ANG"||s.position==="MF"); const basis=pool.length?pool:elf;
    for(let i=0;i<anzahl;i++){ const g=basis.flatMap(s=>s.position==="ANG"?[s,s]:[s]); namen.push(pick(g).name); }
    return namen;
  }
  function toreVerteilen(meineTore,gegnerTore,elf,gegnerName){
    const events=[]; const min=new Set();
    const fm=()=>{let m;do{m=rnd(1,90);}while(min.has(m));min.add(m);return m;};
    const mn=torschützen(meineTore,elf);
    for(let i=0;i<meineTore;i++) events.push({minute:fm(),team:"mein",schütze:mn[i]});
    for(let i=0;i<gegnerTore;i++) events.push({minute:fm(),team:"gegner",schütze:gegnerName});
    return events.sort((a,b)=>a.minute-b.minute);
  }
  function simuliereSpiel(meineStärke,gegnerStärke,gegnerName,elf,runde){
    const diff=meineStärke-gegnerStärke;
    const meineTore=poisson(Math.max(0.2,1.4+diff*0.06));
    const gegnerTore=poisson(Math.max(0.2,1.4-diff*0.06));
    const gSkills={ sch:Math.max(40,Math.min(99,gegnerStärke+rnd(-5,5))), tec:Math.max(40,Math.min(99,gegnerStärke+rnd(-5,5))), kon:Math.max(40,Math.min(99,gegnerStärke+rnd(-5,5))) };

    // Eindeutige Minuten für alle Ereignisse
    const minSet=new Set();
    const fm=()=>{let m;do{m=rnd(1,90);}while(minSet.has(m));minSet.add(m);return m;};

    // 1) Vorfälle (Karten/Verletzungen) mit Minute bestimmen
    const vorfälle=[];
    const vomPlatz=new Set(); // Spieler bereits des Feldes verwiesen
    if(Math.random()<0.15){ const sp=pick(elf); vorfälle.push({typ:"verletzung",minute:fm(),spielerId:sp.id,name:sp.name}); vomPlatz.add(sp.id); }
    const gelbAnzahl=Math.random()<0.5?(Math.random()<0.5?1:2):(Math.random()<0.3?3:0);
    const gelbeProSpieler={};
    for(let i=0;i<gelbAnzahl;i++){
      // Nur Spieler, die noch auf dem Platz sind (nicht verletzt/verwiesen)
      const kand=elf.filter(s=>!vomPlatz.has(s.id) || (gelbeProSpieler[s.id]===1));
      if(!kand.length) break;
      const sp=pick(kand); const bisher=gelbeProSpieler[sp.id]||0; if(bisher>=2) continue;
      gelbeProSpieler[sp.id]=bisher+1;
      const typ=bisher===0?"gelb":"gelb-rot";
      vorfälle.push({typ,minute:fm(),spielerId:sp.id,name:sp.name});
      if(typ==="gelb-rot") vomPlatz.add(sp.id);
    }
    if(Math.random()<0.08){ const kand=elf.filter(s=>!vomPlatz.has(s.id)); if(kand.length){ const sp=pick(kand); vorfälle.push({typ:"rot",minute:fm(),spielerId:sp.id,name:sp.name}); vomPlatz.add(sp.id); } }
    vorfälle.sort((a,b)=>a.minute-b.minute);

    // Reihenfolge sicherstellen: zweite Gelbe (Gelb-Rot) muss nach der ersten Gelben liegen
    Object.keys(gelbeProSpieler).forEach(id=>{
      if(gelbeProSpieler[id]>=2){
        const erste=vorfälle.find(v=>String(v.spielerId)===id && v.typ==="gelb");
        const gr=vorfälle.find(v=>String(v.spielerId)===id && v.typ==="gelb-rot");
        if(erste && gr && gr.minute<erste.minute){ const t=gr.minute; gr.minute=erste.minute; erste.minute=t; }
      }
    });
    vorfälle.sort((a,b)=>a.minute-b.minute);

    // 2) Ab wann ist ein Spieler raus? (Rot, Gelb-Rot oder Verletzung)
    const abMinute={}; // spielerId -> Minute ab der er nicht mehr mitwirkt
    vorfälle.forEach(v=>{
      if((v.typ==="rot"||v.typ==="gelb-rot"||v.typ==="verletzung") && abMinute[v.spielerId]===undefined) abMinute[v.spielerId]=v.minute;
    });

    // 3) Eigene Tore: Minute + Schütze, der zu dieser Minute noch auf dem Platz ist
    const torEvents=[];
    const torMinuten=[]; for(let i=0;i<meineTore;i++) torMinuten.push(fm());
    torMinuten.sort((a,b)=>a-b);
    torMinuten.forEach(minute=>{
      const verfügbar=elf.filter(s=> abMinute[s.id]===undefined || minute < abMinute[s.id]);
      const basis=verfügbar.length?verfügbar:elf;
      const pool=basis.filter(s=>s.position==="ANG"||s.position==="MF");
      const kandidaten=(pool.length?pool:basis).flatMap(s=>s.position==="ANG"?[s,s]:[s]);
      torEvents.push({minute,team:"mein",schütze:pick(kandidaten).name});
    });
    // Gegnertore
    for(let i=0;i<gegnerTore;i++) torEvents.push({minute:fm(),team:"gegner",schütze:gegnerName});
    torEvents.sort((a,b)=>a.minute-b.minute);

    return { runde,gegnerName,meineTore,gegnerTore, torEvents, vorfälle, meineSkills:teamStärke, gSkills };
  }
  function baueGruppen(){
    const alle=[...TEAMS].sort(()=>Math.random()-0.5); const ohneMich=alle.filter(t=>t!==meinTeam);
    const gruppen=[[meinTeam,...ohneMich.slice(0,3)]]; let idx=3;
    for(let g=1;g<16;g++){ gruppen.push(ohneMich.slice(idx,idx+4)); idx+=4; }
    return gruppen;
  }
  function spieleTurnier(){
    const elf=aufstellung.map(id=>kader.find(s=>s.id===id)); const ms=teamStärke.gesamt+rnd(-3,3);
    const stärken={...gegnerStärken,[meinTeam]:teamStärke.gesamt};
    const gruppen=baueGruppen(); const meineGruppe=gruppen[0]; const meineGegner=meineGruppe.filter(t=>t!==meinTeam);
    setTurnierLog([]); setEndergebnis(null);
    const start={ phase:"gruppe",elf,ms,stärken,gruppen,meineGruppe,meineGegner,gruppenSpielIdx:0,
      eigeneErgebnisse:[],rundeIdx:0,log:[],gesperrt:[],gelbKonto:{},sperrKonto:{} };
    setTurnierState(start); setPhase("turnier"); nächstesSpiel(start);
  }
  function setzeFort(){
    const elf=aufstellung.map(id=>kader.find(s=>s.id===id)); const ms=teamStärke.gesamt+rnd(-3,3);
    const stärken={...pausiert.stärken,[meinTeam]:teamStärke.gesamt};
    const neuState={...pausiert,elf,ms,stärken}; setPausiert(null);
    setTurnierState(neuState); setPhase("turnier"); nächstesSpiel(neuState);
  }
  function nächstesSpiel(state){
    let runde,gegner,gegnerStärke;
    if(state.phase==="gruppe"){ runde=`Gruppenphase · Spieltag ${state.gruppenSpielIdx+1}`; gegner=state.meineGegner[state.gruppenSpielIdx]; gegnerStärke=state.stärken[gegner]??70; }
    else { runde=RUNDEN[state.rundeIdx]; gegner=state.feld[1]; gegnerStärke=(state.stärken[gegner]??70)+state.rundeIdx*1.5; }
    const res=simuliereSpiel(state.ms,gegnerStärke,gegner,state.elf,runde);
    res.stadion = runde==="Finale" ? STADIEN[0] : zufallsStadion();
    const diff=state.ms-gegnerStärke; res.siegchance=Math.round(Math.max(8,Math.min(92,50+diff*2.2)));
    setLiveSpiel({res,state});
  }
  function spielFertig(res,state){
    setLiveSpiel(null);
    if(state.phase==="gruppe"){ finalisiereSpiel(state,res,res.meineTore>res.gegnerTore,null); return; }
    if(res.meineTore===res.gegnerTore){
      setElfmeter({ gegner:res.gegnerName,runde:res.runde,stadion:res.stadion,res,meinScore:0,gegnerScore:0,schuss:0,modus:"schiessen",verlauf:[],state });
    } else finalisiereSpiel(state,res,res.meineTore>res.gegnerTore,null);
  }
  function verrechneKarten(state,vorfälle){
    const gelbKonto={...(state.gelbKonto||{})}; let sperrKonto={...(state.sperrKonto||{})};
    Object.keys(sperrKonto).forEach(id=>{ sperrKonto[id]--; if(sperrKonto[id]<=0) delete sperrKonto[id]; });
    const neueSperren=[]; const nameVon=(id)=>{const sp=kader.find(s=>s.id===Number(id)); return sp?sp.name:"Spieler";};
    vorfälle.forEach(v=>{
      if(v.typ==="gelb"){ gelbKonto[v.spielerId]=(gelbKonto[v.spielerId]||0)+1;
        if(gelbKonto[v.spielerId]>=2){ gelbKonto[v.spielerId]=0; sperrKonto[v.spielerId]=Math.max(sperrKonto[v.spielerId]||0,1); neueSperren.push({spielerId:v.spielerId,name:v.name,typ:"gelb-sperre",spiele:1}); } }
      else if(v.typ==="gelb-rot"){ gelbKonto[v.spielerId]=0; sperrKonto[v.spielerId]=Math.max(sperrKonto[v.spielerId]||0,1); neueSperren.push({spielerId:v.spielerId,name:v.name,typ:"gelb-rot",spiele:1}); }
      else if(v.typ==="rot"){ sperrKonto[v.spielerId]=Math.max(sperrKonto[v.spielerId]||0,2); neueSperren.push({spielerId:v.spielerId,name:v.name,typ:"rot",spiele:2}); }
      else if(v.typ==="verletzung"){ sperrKonto[v.spielerId]=Math.max(sperrKonto[v.spielerId]||0,1); neueSperren.push({spielerId:v.spielerId,name:v.name,typ:"verletzung",spiele:1}); }
    });
    const aktuelleSperren=Object.entries(sperrKonto).map(([id,spiele])=>{
      const v=neueSperren.find(s=>String(s.spielerId)===id); return v||{spielerId:Number(id),name:nameVon(id),typ:"sperre",spiele};
    });
    return {gelbKonto,sperrKonto,aktuelleSperren};
  }
  function finalisiereSpiel(state,res,gewonnen,elfmeterErgebnis){
    const neuLog=[...state.log,{...res,gewonnen,elfmeter:elfmeterErgebnis}]; setTurnierLog(neuLog);
    let entwicklung=[];
    if(gewonnen){
      const eingesetzt=new Set(state.elf.map(s=>s.id));
      const ts=new Set(res.torEvents.filter(e=>e.team==="mein").map(e=>e.schütze));
      const nk=kader.map(sp=>{
        if(!eingesetzt.has(sp.id)) return sp;
        const bonus=ts.has(sp.name)?rnd(2,4):rnd(1,2); const v={...sp}; let rest=bonus; const sk=["schnelligkeit","technik","kondition"];
        while(rest>0){ const s=pick(sk); if(v[s]<99){v[s]++;rest--;} else if(sk.every(x=>v[x]>=99)) break; }
        v.rating=spielerRating(v); const d=v.rating-sp.rating; if(d>0) entwicklung.push({name:sp.name,delta:d,torschütze:ts.has(sp.name)}); return v;
      });
      setKader(nk);
    }
    const {gelbKonto,sperrKonto,aktuelleSperren}=verrechneKarten(state,res.vorfälle);
    const neueSperren=aktuelleSperren; const gset=new Set(neueSperren.map(s=>s.spielerId));
    if(gset.size>0) setAufstellung(prev=>prev.filter(id=>!gset.has(id)));

    if(state.phase==="gruppe"){
      const gegner=state.meineGegner[state.gruppenSpielIdx];
      const eigeneErgebnisse=[...state.eigeneErgebnisse,{a:meinTeam,b:gegner,toreA:res.meineTore,toreB:res.gegnerTore}];
      if(state.gruppenSpielIdx<2){
        setTurnierState({...state,gruppenSpielIdx:state.gruppenSpielIdx+1,eigeneErgebnisse,log:neuLog,entwicklung,gesperrt:neueSperren,gelbKonto,sperrKonto}); return;
      }
      const tabelleMeine=simuliereGruppe(state.meineGruppe,state.stärken,eigeneErgebnisse);
      const meinPlatz=tabelleMeine.findIndex(r=>r.team===meinTeam)+1;
      if(meinPlatz>2){ setEndergebnis("gruppe-aus"); setTurnierState({...state,eigeneErgebnisse,log:neuLog,tabelleMeine,meinPlatz}); setPhase("ergebnis"); return; }
      const quali=[]; state.gruppen.forEach((grp,gi)=>{ const tab=gi===0?tabelleMeine:simuliereGruppe(grp,state.stärken,null); quali.push(tab[0].team,tab[1].team); });
      const ohneMich=quali.filter(t=>t!==meinTeam).sort(()=>Math.random()-0.5); const feld=[meinTeam,...ohneMich];
      setTurnierState({...state,phase:"ko",feld,rundeIdx:0,eigeneErgebnisse,log:neuLog,entwicklung,gesperrt:neueSperren,tabelleMeine,meinPlatz,gruppeFertig:true,gelbKonto,sperrKonto}); return;
    }
    if(!gewonnen){ setEndergebnis(res.runde); setPhase("ergebnis"); setTurnierState(null); return; }
    if(state.rundeIdx===RUNDEN.length-1){ setEndergebnis("weltmeister"); setPhase("ergebnis"); setTurnierState(null); return; }
    const feld=state.feld; const sieger=[meinTeam]; const andereErgebnisse=[];
    for(let i=2;i<feld.length;i+=2){ const a=feld[i],b=feld[i+1]; if(b===undefined){sieger.push(a);continue;} const w=autoSpiel(a,b,state.stärken); sieger.push(w); andereErgebnisse.push({a,b,sieger:w}); }
    const ohneMich=sieger.filter(t=>t!==meinTeam).sort(()=>Math.random()-0.5); const neuesFeld=[meinTeam,...ohneMich];
    setTurnierState({...state,rundeIdx:state.rundeIdx+1,feld:neuesFeld,log:neuLog,entwicklung,gesperrt:neueSperren,andereErgebnisse,gruppeFertig:false,gelbKonto,sperrKonto});
  }
  function elfmeterAktion(wahl){
    setElfmeter(em=>{
      const istMein=em.modus==="schiessen"; const cpu=pick(ECKEN).id;
      let m=em.meinScore,g=em.gegnerScore,b;
      if(istMein){ const tor=wahl!==cpu; if(tor)m++; b={typ:"schuss",wahl,twWahl:cpu,tor}; }
      else { const tor=wahl!==cpu; if(tor)g++; b={typ:"halten",schuss:cpu,meinTw:wahl,tor}; }
      const ns=em.schuss+1; const nv=[...em.verlauf,b]; const nm=istMein?"halten":"schiessen";
      const entschieden=ns>=10 && ns%2===0 && m!==g;
      if(entschieden){ const gew=m>g; setTimeout(()=>{finalisiereSpiel(em.state,em.res,gew,{m,g});setElfmeter(null);},1200);
        return {...em,meinScore:m,gegnerScore:g,schuss:ns,verlauf:nv,modus:nm,fertig:true,gewonnen:gew}; }
      return {...em,meinScore:m,gegnerScore:g,schuss:ns,verlauf:nv,modus:nm};
    });
  }
  function neustart(){
    setPhase("auswahl"); setMeinTeam(null); setKader([]); setAufstellung([]); setTurnierLog([]);
    setEndergebnis(null); setElfmeter(null); setTurnierState(null); setLiveSpiel(null); setPausiert(null);
  }

  return (
    <div className="wrap">
      <div className="row gap2 mb4">
        <Trophy size={28} color="#f59e0b" />
        <h1>WM Fußballmanager</h1>
      </div>

      {phase==="auswahl" && (
        <div>
          <p className="grey mb4">WM in Deutschland 🇩🇪 · 64 Teams, Gruppenphase und K.o.-Runde in 11 Stadien. Mit echtem DFB-Kader 2026. Wähle dein Team und führe es zum Titel!</p>
          <div className="grid g4">
            {TEAMS.map(t=>(
              <button key={t} className="teamsel" onClick={()=>wähleTeam(t)}>
                <span style={{fontSize:"16px"}}>{flagge(t)}</span> {t}
              </button>
            ))}
          </div>
        </div>
      )}

      {phase==="aufstellung" && (
        <Aufstellung {...{meinTeam,kader,aufstellung,empfehlung,gesperrteIds,gesperrteListe,posZähler,
          teamStärke,aufstellungKomplett,pausiert,toggleSpieler,übernehmeEmpfehlung,neustart,
          start:pausiert?setzeFort:spieleTurnier}} />
      )}

      {phase==="turnier" && (
        <div>
          {liveSpiel ? <LiveSpiel key={liveSpiel.res.runde+liveSpiel.res.gegnerName} ls={liveSpiel} meinTeam={meinTeam} onFertig={spielFertig} />
          : elfmeter ? <ElfmeterView em={elfmeter} meinTeam={meinTeam} onAktion={elfmeterAktion} />
          : turnierState ? (
            <Zwischen {...{turnierState,meinTeam,turnierLog,nächstesSpiel,
              aufstellungAendern:()=>{setPausiert(turnierState);setTurnierState(null);setPhase("aufstellung");}}} />
          ) : null}
        </div>
      )}

      {phase==="ergebnis" && (
        <Ergebnis {...{endergebnis,meinTeam,turnierState,turnierLog,
          neueAufstellung:()=>{setTurnierState(null);setPausiert(null);setPhase("aufstellung");}, neustart}} />
      )}
    </div>
  );
}

function Aufstellung({meinTeam,kader,aufstellung,empfehlung,gesperrteIds,gesperrteListe,posZähler,teamStärke,aufstellungKomplett,pausiert,toggleSpieler,übernehmeEmpfehlung,neustart,start}){
  return (
    <div>
      <div className="row between mb3 wrapf gap2">
        <h2 className="row gap2" style={{margin:0}}><span style={{fontSize:"20px"}}>{flagge(meinTeam)}</span> {meinTeam} – Kader (24)</h2>
        {pausiert ? <span className="semi small" style={{color:"#2563eb"}}>{pausiert.phase==="gruppe"?`Spieltag ${pausiert.gruppenSpielIdx+1} steht an`:`${RUNDEN[pausiert.rundeIdx]} steht an`}</span>
          : <button onClick={neustart} className="row gap1 small grey" style={{background:"none",border:"none"}}><Rotate size={14}/> Team wechseln</button>}
      </div>
      <div className="panel mb4" style={{background:"#f0fdf4",borderColor:"#bbf7d0"}}>
        <div className="row between mb2">
          <span className="semi row gap1"><Users size={16}/> Aufstellung {aufstellung.length}/11</span>
          <span className="small grey">Formation 1-4-4-2</span>
        </div>
        <div className="row gap2 wrapf small mb2">
          {Object.keys(FORMATION).map(p=>(
            <span key={p} className={`pill pos-${p}`} style={posZähler[p]===FORMATION[p]?{fontWeight:700,boxShadow:"0 0 0 2px currentColor"}:{}}>{p}: {posZähler[p]}/{FORMATION[p]}</span>
          ))}
        </div>
        <button onClick={übernehmeEmpfehlung} className="btn btn-amber row gap1"><Star size={13}/> Beste Elf empfehlen</button>
        {aufstellung.length>0 && (
          <div className="grid g3 mt3 tc small">
            <div className="card"><div className="row center" style={{color:"#dc2626"}}><Zap size={14}/></div>Schnellig. <b>{teamStärke.sch}</b></div>
            <div className="card"><div className="row center" style={{color:"#2563eb"}}><Target size={14}/></div>Technik <b>{teamStärke.tec}</b></div>
            <div className="card"><div className="row center" style={{color:"#16a34a"}}><Shield size={14}/></div>Kondition <b>{teamStärke.kon}</b></div>
          </div>
        )}
      </div>
      <div className="grid gsm2 mb4">
        {kader.map(sp=>{
          const gewählt=aufstellung.includes(sp.id), empfohlen=empfehlung.includes(sp.id), gesperrt=gesperrteIds.has(sp.id);
          const sperrInfo=gesperrteListe.find(s=>s.spielerId===sp.id);
          return (
            <button key={sp.id} onClick={()=>toggleSpieler(sp.id)} disabled={gesperrt} className={`plr ${gesperrt?"lock":gewählt?"sel":""}`}>
              <span className={`posbadge pos-${sp.position}`}>{sp.position}</span>
              <div className="flex1">
                <div className="semi small truncate row gap1">
                  {sp.name}
                  {empfohlen&&!gesperrt && <Star size={12} className="star" fill="#fbbf24"/>}
                  {gesperrt && <span className="shrink0">{sperrInfo?.typ==="rot"?"🟥":sperrInfo?.typ==="gelb-rot"||sperrInfo?.typ==="gelb-sperre"?"🟨":"🩹"}</span>}
                </div>
                <div className="row gap2 small grey">
                  {gesperrt ? <span style={{color:"#ef4444",fontWeight:600}}>
                    {sperrInfo?.typ==="rot"?"Gesperrt (Rot)":sperrInfo?.typ==="gelb-rot"?"Gesperrt (Gelb-Rot)":sperrInfo?.typ==="gelb-sperre"?"Gesperrt (2 Gelbe)":sperrInfo?.typ==="verletzung"?"Verletzt":"Gesperrt"}
                    {sperrInfo?.spiele>1?` · ${sperrInfo.spiele} Sp.`:""}</span>
                  : <><span>SCH {sp.schnelligkeit}</span><span>TEC {sp.technik}</span><span>KON {sp.kondition}</span><span style={{fontWeight:700,color:"#374151"}}>★{sp.rating}</span></>}
                </div>
              </div>
              {gewählt&&!gesperrt && <Chevron size={18} color="#16a34a" className="shrink0"/>}
            </button>
          );
        })}
      </div>
      <button disabled={!aufstellungKomplett} onClick={start} className="btn btn-green">
        <Trophy size={20}/> {aufstellungKomplett?(pausiert?(pausiert.phase==="gruppe"?`Spieltag ${pausiert.gruppenSpielIdx+1} spielen`:`${RUNDEN[pausiert.rundeIdx]} spielen`):"WM starten!"):`Noch ${11-aufstellung.length} Spieler wählen`}
      </button>
    </div>
  );
}

function Zwischen({turnierState,meinTeam,turnierLog,nächstesSpiel,aufstellungAendern}){
  const ts=turnierState;
  return (
    <div>
      {ts.gruppeFertig ? (
        <div>
          <h2>Gruppenphase geschafft! 🎉</h2>
          <p className="grey mb2">Du wurdest <b>{ts.meinPlatz}.</b> in deiner Gruppe und ziehst in die K.o.-Phase ein.</p>
          {ts.tabelleMeine && <Tabelle tab={ts.tabelleMeine} meinTeam={meinTeam} markTop/>}
          <p className="grey mb3">Noch <b>{ts.feld.length} Teams</b> dabei. Erstes K.o.-Spiel ({RUNDEN[ts.rundeIdx]}): {flagge(ts.feld[1])} {ts.feld[1]}.</p>
        </div>
      ) : ts.phase==="gruppe" ? (
        <div>
          <h2>Gruppenphase</h2>
          <p className="grey mb3">Als Nächstes (Spieltag {ts.gruppenSpielIdx+1}): {flagge(ts.meineGegner[ts.gruppenSpielIdx])} {ts.meineGegner[ts.gruppenSpielIdx]}.</p>
          <Tabelle tab={simuliereGruppe(ts.meineGruppe,ts.stärken,ts.eigeneErgebnisse,true)} meinTeam={meinTeam}/>
        </div>
      ) : (
        <div>
          <h2>Weiter geht's!</h2>
          <p className="grey mb3">Du hast das {RUNDEN[ts.rundeIdx-1]} überstanden. Noch <b>{ts.feld.length} Teams</b> im Rennen. Als Nächstes im <b>{RUNDEN[ts.rundeIdx]}</b>: {flagge(ts.feld[1])} {ts.feld[1]}.</p>
          {ts.andereErgebnisse && ts.andereErgebnisse.length>0 && (
            <details className="panel mb3" style={{background:"#f9fafb",borderColor:"#e5e7eb"}}>
              <summary>Andere Ergebnisse der Runde ({ts.andereErgebnisse.length})</summary>
              <div className="grid gsm2 small mt2" style={{gap:"2px 12px"}}>
                {ts.andereErgebnisse.map((e,i)=>(
                  <div key={i} className="row gap1">
                    <span className={e.sieger===e.a?"bold":"grey2 lt"}>{flagge(e.a)} {e.a}</span>
                    <span className="grey2">vs</span>
                    <span className={e.sieger===e.b?"bold":"grey2 lt"}>{flagge(e.b)} {e.b}</span>
                  </div>
                ))}
              </div>
            </details>
          )}
        </div>
      )}

      {ts.gesperrt && ts.gesperrt.length>0 && (
        <div className="panel mb3" style={{background:"#fef2f2",borderColor:"#fecaca"}}>
          <div className="semi small mb2">⚠️ Ausfälle fürs nächste Spiel</div>
          <div className="small" style={{lineHeight:1.6}}>
            {ts.gesperrt.map((s,i)=>{
              const sym=s.typ==="rot"?"🟥":s.typ==="gelb-rot"?"🟨🟥":s.typ==="gelb-sperre"?"🟨🟨":s.typ==="verletzung"?"🩹":"⛔";
              const grund=s.typ==="rot"?"Rote Karte":s.typ==="gelb-rot"?"Gelb-Rote Karte":s.typ==="gelb-sperre"?"2 Gelbe (gesammelt)":s.typ==="verletzung"?"verletzt":"gesperrt";
              return <div key={i}>{sym} <b>{s.name}</b> – {grund}{s.spiele>1?` (noch ${s.spiele} Spiele)`:""}</div>;
            })}
          </div>
          <p className="tiny grey mt2">Du musst die Aufstellung anpassen, bevor es weitergeht.</p>
        </div>
      )}

      {ts.entwicklung && ts.entwicklung.length>0 && (
        <div className="panel mb3" style={{background:"#fffbeb",borderColor:"#fde68a"}}>
          <div className="semi small row gap1 mb2"><Star size={14} className="star" fill="#fbbf24"/> Spieler verbessert</div>
          <div className="grid g2 small" style={{gap:"2px 12px"}}>
            {[...ts.entwicklung].sort((a,b)=>b.delta-a.delta).map((e,i)=>(
              <div key={i} className="row between"><span className="truncate">{e.torschütze&&"⚽ "}{e.name}</span><span className="bold shrink0" style={{color:"#16a34a"}}>★ +{e.delta}</span></div>
            ))}
          </div>
        </div>
      )}

      <div className="row gap2">
        <button onClick={aufstellungAendern} className="btn btn-blue flex1"><Users size={18}/> Aufstellung ändern</button>
        {(!ts.gesperrt || ts.gesperrt.length===0) && (
          <button onClick={()=>nächstesSpiel(ts)} className="btn btn-green flex1"><Chevron size={18}/> Direkt spielen</button>
        )}
      </div>
      <div className="mt4 grid" style={{gap:"8px"}}>
        {turnierLog.map((s,i)=><Spielkarte key={i} s={s} meinTeam={meinTeam} compact/>)}
      </div>
    </div>
  );
}

function Tabelle({tab,meinTeam,markTop}){
  return (
    <div className="tbl mb3">
      <div className="hd"><span className="flex1">Gruppe</span><span className="w8">Sp</span><span className="w10">Tore</span><span className="w8">Pkt</span></div>
      {tab.map((r,i)=>(
        <div key={r.team} className={`tr2 ${r.team===meinTeam?"me":""}`} style={markTop&&i>=2?{color:"#9ca3af"}:{}}>
          <span className="flex1 row gap1">{i+1}. {flagge(r.team)} {r.team}{markTop&&i<2&&<span style={{color:"#16a34a",fontSize:"11px"}}>✓</span>}</span>
          <span className="w8">{r.sp}</span><span className="w10">{r.tore}:{r.gegentore}</span><span className="w8">{r.pkt}</span>
        </div>
      ))}
    </div>
  );
}

function Spielkarte({s,meinTeam,compact}){
  return (
    <div className="panel" style={{background:s.gewonnen?"#f0fdf4":"#fef2f2",borderColor:s.gewonnen?"#bbf7d0":"#fecaca"}}>
      <div className="row between">
        <div>
          <div className="tiny semi grey">{s.runde}</div>
          <div className="semi">{flagge(meinTeam)} {meinTeam} – {flagge(s.gegnerName)} {s.gegnerName}</div>
          {s.stadion && <div className="tiny grey2">📍 {s.stadion.stadion}, {s.stadion.stadt}</div>}
          {s.elfmeter && <div className="tiny grey">n.E. {s.elfmeter.m}:{s.elfmeter.g}</div>}
        </div>
        <div className="bold" style={{fontSize:"20px",color:s.gewonnen?"#16a34a":"#dc2626"}}>{s.meineTore}:{s.gegnerTore}</div>
      </div>
      {!compact && s.torEvents.length>0 && (
        <div className="mt2 tiny" style={{lineHeight:1.6}}>
          {s.torEvents.map((e,i)=>(<div key={i} style={{color:e.team==="mein"?"#15803d":"#dc2626"}}>⚽ <span className="mono semi">{e.minute}'</span> {e.schütze}{e.team==="gegner"&&" (Gegner)"}</div>))}
        </div>
      )}
      {!compact && s.vorfälle && s.vorfälle.length>0 && (
        <div className="mt1 tiny" style={{lineHeight:1.6}}>
          {s.vorfälle.map((v,i)=>{
            const sym=v.typ==="rot"?"🟥":v.typ==="gelb-rot"?"🟨🟥":v.typ==="gelb"?"🟨":"🩹";
            const txt=v.typ==="rot"?"(Rote Karte)":v.typ==="gelb-rot"?"(Gelb-Rot)":v.typ==="gelb"?"(Gelbe Karte)":"(verletzt)";
            return <div key={i} style={{color:"#ea580c"}}>{sym} <span className="mono semi">{v.minute}'</span> {v.name} {txt}</div>;
          })}
        </div>
      )}
      {!compact && (
        <div className="grid g3 mt2 tiny tc">
          {[["Schnelligkeit",s.meineSkills.sch,s.gSkills.sch],["Technik",s.meineSkills.tec,s.gSkills.tec],["Kondition",s.meineSkills.kon,s.gSkills.kon]].map(([l,m,g])=>(
            <div key={l} style={{background:"rgba(255,255,255,.7)",borderRadius:"8px",padding:"6px"}}>
              <div className="grey">{l}</div>
              <div><span style={m>=g?{fontWeight:700,color:"#15803d"}:{color:"#4b5563"}}>{m}</span><span className="grey2"> : </span><span style={g>m?{fontWeight:700,color:"#b91c1c"}:{color:"#4b5563"}}>{g}</span></div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function LiveSpiel({ls,meinTeam,onFertig}){
  const {res,state}=ls;
  const [minute,setMinute]=useState(0);
  const [meinScore,setMeinScore]=useState(0);
  const [gegnerScore,setGegnerScore]=useState(0);
  const [gezeigt,setGezeigt]=useState([]);
  const fertigRef=useRef(false);
  useEffect(()=>{
    const DAUER=4000;
    const alle=[...res.torEvents.map(e=>({...e,art:"tor"})),...(res.vorfälle||[]).map(v=>({...v,art:"vorfall"}))].sort((a,b)=>a.minute-b.minute);
    const start=performance.now(); let raf;
    function tick(now){
      const t=Math.min(1,(now-start)/DAUER); const m=Math.round(t*90); setMinute(m);
      const erreicht=alle.filter(e=>e.minute<=m); setGezeigt(erreicht);
      setMeinScore(erreicht.filter(e=>e.art==="tor"&&e.team==="mein").length);
      setGegnerScore(erreicht.filter(e=>e.art==="tor"&&e.team==="gegner").length);
      if(t<1) raf=requestAnimationFrame(tick);
      else if(!fertigRef.current){ fertigRef.current=true; setTimeout(()=>onFertig(res,state),900); }
    }
    raf=requestAnimationFrame(tick); return ()=>cancelAnimationFrame(raf);
  },[]);
  return (
    <div>
      <div className="tc mb3">
        <div className="tiny semi grey">{res.runde}</div>
        {res.stadion && <div className="tiny grey mt1">📍 {res.stadion.stadion}, {res.stadion.stadt}</div>}
        <div className="row center gap2 mt1" style={{color:"#374151"}}><Clock size={18} color="#16a34a"/><span className="mono bold" style={{fontSize:"20px"}}>{minute}'</span></div>
      </div>
      <div className="scoreboard mb4">
        <div className="row center gap4 bold" style={{fontSize:"22px"}}>
          <span className="flex1 tr">{flagge(meinTeam)} {meinTeam}</span>
          <span className="mono" style={{background:"rgba(255,255,255,.2)",borderRadius:"8px",padding:"4px 16px"}}>{meinScore} : {gegnerScore}</span>
          <span className="flex1 tl">{res.gegnerName} {flagge(res.gegnerName)}</span>
        </div>
        <div className="bar"><div style={{width:`${(minute/90)*100}%`}}/></div>
      </div>
      <div style={{minHeight:"60px",lineHeight:1.7}}>
        {gezeigt.length===0 ? (
          <div className="tc">
            <p className="grey2 small mb2">Anpfiff! Das Spiel läuft…</p>
            {res.siegchance!=null && (
              <div style={{display:"inline-block",background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:"8px",padding:"8px 12px"}}>
                <div className="tiny grey mb1">Siegprognose</div>
                <div className="row gap2">
                  <span className="small bold" style={{color:"#16a34a"}}>{res.siegchance}%</span>
                  <div style={{width:"128px",height:"8px",background:"#fecaca",borderRadius:"99px",overflow:"hidden"}}><div style={{height:"100%",background:"#22c55e",width:`${res.siegchance}%`}}/></div>
                  <span className="small bold" style={{color:"#ef4444"}}>{100-res.siegchance}%</span>
                </div>
              </div>
            )}
          </div>
        ) : gezeigt.map((e,i)=>{
          if(e.art==="vorfall"){
            const sym=e.typ==="rot"?"🟥":e.typ==="gelb-rot"?"🟨🟥":e.typ==="gelb"?"🟨":"🩹";
            const txt=e.typ==="rot"?"Rote Karte!":e.typ==="gelb-rot"?"Gelb-Rote Karte!":e.typ==="gelb"?"Gelbe Karte":"verletzt";
            return <div key={i} className="small row gap2" style={{color:"#ea580c"}}><span className="mono bold">{e.minute}'</span><span>{sym}</span><span className="semi">{e.name}</span><span className="tiny grey">{txt}</span></div>;
          }
          return <div key={i} className="small row gap2" style={{color:e.team==="mein"?"#15803d":"#dc2626"}}><span className="mono bold">{e.minute}'</span><span>⚽</span><span className="semi">{e.schütze}</span>{e.team==="gegner"&&<span className="tiny grey">(Gegner)</span>}</div>;
        })}
      </div>
    </div>
  );
}

function ElfmeterView({em,meinTeam,onAktion}){
  const istSchuss=em.modus==="schiessen"; const letzte=em.verlauf[em.verlauf.length-1];
  return (
    <div>
      <div className="tc mb3">
        <div className="tiny semi grey">{em.runde} · Elfmeterschießen</div>
        {em.stadion && <div className="tiny grey2 mt1">📍 {em.stadion.stadion}, {em.stadion.stadt}</div>}
        <div className="bold mt1" style={{fontSize:"30px"}}>
          <span style={{color:"#16a34a"}}>{em.meinScore}</span><span className="grey2"> : </span><span style={{color:"#dc2626"}}>{em.gegnerScore}</span>
        </div>
        <div className="small grey">{flagge(meinTeam)} {meinTeam} vs {em.gegner} {flagge(em.gegner)}</div>
      </div>
      <div className="mb4" style={{background:"#16a34a",borderRadius:"12px",padding:"16px"}}>
        <div className="goal">
          {ECKEN.map(e=>{
            let bg="transparent";
            if(letzte){
              if(letzte.typ==="schuss"){ if(letzte.wahl===e.id) bg=letzte.tor?"#86efac":"#e5e7eb"; if(letzte.twWahl===e.id) bg="#fef08a"; }
              else { if(letzte.schuss===e.id) bg=letzte.tor?"#fca5a5":"#e5e7eb"; if(letzte.meinTw===e.id) bg="#fef08a"; }
            }
            return <div key={e.id} style={{background:bg}}><e.icon size={20} color="#9ca3af"/></div>;
          })}
        </div>
      </div>
      {letzte && (
        <div className="tc small semi mb3">
          {letzte.typ==="schuss" ? (letzte.tor?"⚽ TOR! Der Torwart war in der falschen Ecke.":"🧤 Gehalten! Der Torwart hat pariert.")
            : (letzte.tor?"😟 Gegentor – du warst in der falschen Ecke.":"🧤 Super! Du hast den Schuss gehalten!")}
        </div>
      )}
      {!em.fertig ? (
        <div>
          <p className="tc semi mb3">{istSchuss?"⚽ In welche Ecke schießt du?":"🧤 In welche Ecke springst du?"}</p>
          <div className="grid g3">
            {ECKEN.map(e=>(<button key={e.id} onClick={()=>onAktion(e.id)} className="ecke"><e.icon size={22}/>{e.label}</button>))}
          </div>
          <p className="tc tiny grey2 mt2">Schuss {Math.floor(em.schuss/2)+1}</p>
        </div>
      ) : (
        <div className="tc bold" style={{fontSize:"18px",padding:"12px",borderRadius:"12px",background:em.gewonnen?"#dcfce7":"#fee2e2",color:em.gewonnen?"#15803d":"#b91c1c"}}>
          {em.gewonnen?"🎉 Du gewinnst das Elfmeterschießen!":"😞 Verloren im Elfmeterschießen."}
        </div>
      )}
    </div>
  );
}

function Ergebnis({endergebnis,meinTeam,turnierState,turnierLog,neueAufstellung,neustart}){
  return (
    <div>
      <div className="panel tc mb4" style={endergebnis==="weltmeister"?{background:"#fef3c7",borderColor:"#fbbf24",borderWidth:"2px"}:{background:"#f3f4f6",borderColor:"#d1d5db",borderWidth:"2px"}}>
        <div className="row center mb2"><Trophy size={48} color={endergebnis==="weltmeister"?"#f59e0b":"#9ca3af"}/></div>
        {endergebnis==="weltmeister" ? <><h2 style={{color:"#b45309",fontSize:"24px"}}>🏆 WELTMEISTER! 🏆</h2><p style={{color:"#d97706"}}>{flagge(meinTeam)} {meinTeam} gewinnt die Weltmeisterschaft!</p></>
        : endergebnis==="gruppe-aus" ? <><h2 style={{color:"#374151"}}>In der Gruppenphase ausgeschieden</h2><p className="grey">{flagge(meinTeam)} {meinTeam} wurde nur {turnierState?.meinPlatz}. – nur die Top 2 kommen weiter.</p></>
        : <><h2 style={{color:"#374151"}}>Aus im {endergebnis}</h2><p className="grey">{flagge(meinTeam)} {meinTeam} ist ausgeschieden. Nächstes Mal!</p></>}
      </div>
      <div className="grid mb4" style={{gap:"12px"}}>
        {turnierLog.map((s,i)=><Spielkarte key={i} s={s} meinTeam={meinTeam}/>)}
      </div>
      <div className="row gap2">
        <button onClick={neueAufstellung} className="btn btn-blue flex1">Neue Aufstellung</button>
        <button onClick={neustart} className="btn btn-grey flex1"><Rotate size={18}/> Neues Spiel</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
